# https://render.com 에서 GitHub 저장소와 연결 후 Web Service로 배포할 때 사용할 수 있는 예시입니다.
# Render 대시보드: New → Web Service → GitHub 저장소 선택 → Start Command: npm start
services:
  - type: web
    name: work-log
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
